name: Build WA App Service Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      common_lib_ref:
        description: byte-v-forge/common-lib ref to include in the Docker build context.
        required: false
        default: main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wa-app-service
  COMMON_LIB_REF: ${{ github.event.inputs.common_lib_ref || 'main' }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout wa-app
        uses: actions/checkout@v4
        with:
          path: source/wa-app

      - name: Checkout common-lib
        uses: actions/checkout@v4
        with:
          repository: byte-v-forge/common-lib
          ref: ${{ env.COMMON_LIB_REF }}
          path: source/common-lib

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: source
          file: source/wa-app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
